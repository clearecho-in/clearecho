<section id="faqs">
  <div class="container">
    <span class="faqs-tag">Got questions</span>
    <h2>FAQs</h2>
    <p class="faqs-subtitle">
      Everything you need to know about ClearEcho and how we grow your brand.
    </p>
  </div>

  <div class="faqs-list">
    @for (faq of faqs; track faq.question; let i = $index) {
      <div class="faq-item" [class.open]="openIndex === i">
        <button class="faq-question" (click)="toggleFAQ(i)">
          <span class="faq-question-text">{{ faq.question }}</span>
          <span class="faq-icon"></span>
        </button>
        <div class="faq-answer">
          <p class="faq-answer-inner">
            {{ faq.answer }}
          </p>
        </div>
      </div>
    }
  </div>
</section>
